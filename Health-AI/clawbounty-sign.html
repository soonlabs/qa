<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <title>ClawBounty 签名助手</title>
    <style>
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: linear-gradient(135deg, #6366f1 0%, #8b5cf6 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            margin: 0;
            padding: 20px;
        }
        .container {
            background: white;
            border-radius: 16px;
            padding: 40px;
            max-width: 480px;
            width: 100%;
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.25);
        }
        h1 {
            margin: 0 0 8px 0;
            font-size: 24px;
            color: #1f2937;
        }
        .subtitle {
            color: #6b7280;
            margin-bottom: 24px;
        }
        .wallet-address {
            background: #f3f4f6;
            padding: 12px 16px;
            border-radius: 8px;
            font-family: monospace;
            font-size: 14px;
            color: #374151;
            margin-bottom: 20px;
            word-break: break-all;
        }
        .message-box {
            background: #1f2937;
            color: #10b981;
            padding: 16px;
            border-radius: 8px;
            font-family: monospace;
            font-size: 13px;
            margin-bottom: 20px;
            word-break: break-all;
        }
        button {
            width: 100%;
            padding: 14px 24px;
            background: linear-gradient(135deg, #6366f1 0%, #8b5cf6 100%);
            color: white;
            border: none;
            border-radius: 8px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            transition: transform 0.2s, box-shadow 0.2s;
        }
        button:hover {
            transform: translateY(-2px);
            box-shadow: 0 10px 20px -5px rgba(99, 102, 241, 0.4);
        }
        button:disabled {
            background: #9ca3af;
            cursor: not-allowed;
            transform: none;
        }
        .result {
            margin-top: 20px;
            padding: 16px;
            background: #f0fdf4;
            border: 1px solid #86efac;
            border-radius: 8px;
            display: none;
        }
        .result.show {
            display: block;
        }
        .result-label {
            font-size: 12px;
            color: #166534;
            margin-bottom: 8px;
            font-weight: 600;
        }
        .signature {
            font-family: monospace;
            font-size: 12px;
            color: #1f2937;
            word-break: break-all;
            background: white;
            padding: 12px;
            border-radius: 4px;
            border: 1px solid #bbf7d0;
        }
        .error {
            margin-top: 20px;
            padding: 16px;
            background: #fef2f2;
            border: 1px solid #fecaca;
            border-radius: 8px;
            color: #dc2626;
            display: none;
        }
        .error.show {
            display: block;
        }
        .copy-btn {
            margin-top: 12px;
            padding: 8px 16px;
            background: #10b981;
            color: white;
            border: none;
            border-radius: 6px;
            font-size: 14px;
            cursor: pointer;
        }
        .copy-btn:hover {
            background: #059669;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>🦞 ClawBounty 签名助手</h1>
        <p class="subtitle">点击下方按钮使用 MetaMask/OKX 签名注册消息</p>
        
        <div class="wallet-address">
            <strong>钱包地址：</strong><br>
            0x4a93dcbbfa2dc4eb61d37d1415e4d9fb1d609e07
        </div>
        
        <div class="message-box">
            clawbounty-register:nonce_01KKTKSHRMQ3N4FH29VSHE94Z3
        </div>
        
        <button id="signBtn" onclick="signMessage()">✍️ 签名消息</button>
        
        <div id="result" class="result">
            <div class="result-label">✅ 签名成功！请复制以下结果：</div>
            <div class="signature" id="signature"></div>
            <button class="copy-btn" onclick="copySignature()">📋 复制签名</button>
        </div>
        
        <div id="error" class="error"></div>
    </div>

    <script>
        async function signMessage() {
            const btn = document.getElementById('signBtn');
            const result = document.getElementById('result');
            const error = document.getElementById('error');
            
            btn.disabled = true;
            btn.textContent = '⏳ 等待签名...';
            result.classList.remove('show');
            error.classList.remove('show');
            
            try {
                // 检查是否有以太坊 provider
                if (typeof window.ethereum === 'undefined') {
                    throw new Error('未检测到钱包插件，请安装 MetaMask 或 OKX Wallet');
                }
                
                const message = "clawbounty-register:nonce_01KKTKSHRMQ3N4FH29VSHE94Z3";
                const from = "0x4a93dcbbfa2dc4eb61d37d1415e4d9fb1d609e07";
                
                // 请求签名
                const signature = await window.ethereum.request({
                    method: "personal_sign",
                    params: [message, from]
                });
                
                // 显示结果
                document.getElementById('signature').textContent = signature;
                result.classList.add('show');
                btn.textContent = '✅ 签名完成';
                
            } catch (err) {
                error.textContent = '❌ ' + (err.message || '签名失败，请重试');
                error.classList.add('show');
                btn.disabled = false;
                btn.textContent = '✍️ 重新签名';
            }
        }
        
        function copySignature() {
            const signature = document.getElementById('signature').textContent;
            navigator.clipboard.writeText(signature).then(() => {
                alert('✅ 签名已复制！请粘贴发送给 lucykini');
            });
        }
    </script>
</body>
</html>
