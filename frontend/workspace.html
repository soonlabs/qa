<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <title>Health AI 控制台</title>
  <link rel="stylesheet" href="styles.css?v=20260352" />
</head>
<body>
  <div class="ambient-glow"></div>
  <div class="grid-overlay"></div>
  
  <header class="brand-nav workspace-header">
    <div class="brand-stack">
      <span class="brand-logo">
        <span class="logo-pulse"></span>
        <svg class="lobster-icon" viewBox="0 0 32 32" fill="none" xmlns="http://www.w3.org/2000/svg">
          <defs>
            <linearGradient id="lobsterBody" x1="0%" y1="0%" x2="100%" y2="100%">
              <stop offset="0%" stop-color="#6366f1"/>
              <stop offset="50%" stop-color="#7c3aed"/>
              <stop offset="100%" stop-color="#8b5cf6"/>
            </linearGradient>
            <filter id="glow" x="-50%" y="-50%" width="200%" height="200%">
              <feGaussianBlur stdDeviation="1" result="coloredBlur"/>
              <feMerge>
                <feMergeNode in="coloredBlur"/>
                <feMergeNode in="SourceGraphic"/>
              </feMerge>
            </filter>
          </defs>
          <path d="M16 28L13 30L16 31L19 30L16 28" fill="url(#lobsterBody)" opacity="0.9"/>
          <path d="M16 24L14 27H18L16 24" fill="url(#lobsterBody)" opacity="0.8"/>
          <ellipse cx="16" cy="19" rx="5" ry="6" fill="url(#lobsterBody)"/>
          <path d="M13 17H19M13 19H19M13 21H19" stroke="rgba(255,255,255,0.3)" stroke-width="0.5" stroke-linecap="round"/>
          <ellipse cx="16" cy="12" rx="4" ry="3.5" fill="url(#lobsterBody)"/>
          <circle cx="16" cy="7" r="3" fill="url(#lobsterBody)"/>
          <circle cx="14.5" cy="6.5" r="1" fill="#22d3ee" filter="url(#glow)"/>
          <circle cx="17.5" cy="6.5" r="1" fill="#22d3ee" filter="url(#glow)"/>
          <path d="M14 5C12 3 9 2 6 3" stroke="url(#lobsterBody)" stroke-width="1.5" stroke-linecap="round" fill="none"/>
          <path d="M18 5C20 3 23 2 26 3" stroke="url(#lobsterBody)" stroke-width="1.5" stroke-linecap="round" fill="none"/>
          <path d="M14 5C13 3 11 2 9 3" stroke="url(#lobsterBody)" stroke-width="1" stroke-linecap="round" fill="none" opacity="0.7"/>
          <path d="M18 5C19 3 21 2 23 3" stroke="url(#lobsterBody)" stroke-width="1" stroke-linecap="round" fill="none" opacity="0.7"/>
          <path d="M12 13C8 12 6 10 7 8C8 6 10 7 11 9" stroke="url(#lobsterBody)" stroke-width="2" stroke-linecap="round" fill="none"/>
          <circle cx="7" cy="8" r="1.5" fill="url(#lobsterBody)"/>
          <path d="M20 13C24 10 26 7 24 5C22 3 20 5 21 7" stroke="url(#lobsterBody)" stroke-width="2" stroke-linecap="round" fill="none"/>
          <circle cx="24" cy="5" r="1.5" fill="#22d3ee" filter="url(#glow)"/>
          <path d="M24 5L28 3" stroke="#22d3ee" stroke-width="0.8" stroke-dasharray="2 1" opacity="0.6"/>
          <path d="M12 16L9 18M12 18L9 20" stroke="url(#lobsterBody)" stroke-width="1" stroke-linecap="round" opacity="0.6"/>
          <path d="M20 16L23 18M20 18L23 20" stroke="url(#lobsterBody)" stroke-width="1" stroke-linecap="round" opacity="0.6"/>
          <path d="M14 17L15 15L16 18L17 16L18 17" stroke="#22d3ee" stroke-width="0.6" stroke-linecap="round" fill="none" opacity="0.8"/>
        </svg>
      </span>
      <h1 class="brand-name">Health AI</h1>
      <a class="nav-link" href="index.html">首页</a>
    </div>
    <div class="header-actions">
      <button id="wallet-connect" class="wallet-btn">
        <span class="wallet-icon">👛</span>
        <span id="wallet-text">连接钱包</span>
      </button>
    </div>
  </header>

  <div id="workspace-tabs" class="workspace-tabs">
    <button data-tab="skill-security-audit">Skill 安全审计</button>
    <button data-tab="multichain-contract-vuln">合约审计</button>
    <button data-tab="skill-stress-lab">压力测试</button>
  </div>

  <section id="app-shell">
    <section id="context-banner">
      <h3 id="current-skill-title">Skill 安全审计</h3>
      <p id="current-skill-desc">一键式全面扫描 Skill 安全风险，智能识别权限漏洞与配置隐患，输出多维度健康评分。</p>
    </section>

    <main class="workspace-grid">
      <section class="panel" id="input-panel">
        <h2>上传代码包</h2>
        <p class="panel-desc">请选择 Skill/Agent 的压缩包，直接上传即可触发体检。</p>

        <div class="upload-zone" id="upload-zone">
          <input type="file" id="code-upload" accept=".zip" hidden />
          <div class="upload-hint" id="upload-hint">
            <span class="upload-icon">📦</span>
            <p class="upload-title">点击或拖拽上传压缩包</p>
            <p class="upload-subtitle">支持 .zip 格式，最大 50MB</p>
          </div>
          <div class="upload-file-info hidden" id="file-info">
            <span class="file-icon">📄</span>
            <div class="file-details">
              <span class="file-name" id="file-name"></span>
              <span class="file-size" id="file-size"></span>
            </div>
            <button class="file-remove" id="file-remove" title="移除文件">✕</button>
          </div>
        </div>

        <div id="param-fields"></div>
        <button id="run-task">开始分析</button>
      </section>

      <section class="panel" id="result-panel">
        <h2>任务结果</h2>
        <div id="task-status" class="status">未开始</div>
        <p id="task-summary" class="task-summary">上传 Skill 包后，可在这里查看状态并下载报告。</p>
        <div id="artifact-links" class="artifact-links hidden"></div>
        <div id="report-preview" class="report-preview hidden"></div>
      </section>
    </main>

    <section class="panel history-panel" id="history-panel">
      <div class="history-head">
        <div>
          <h2>分析历史</h2>
          <div class="history-filters" id="history-filters">
            <button class="filter-btn active" data-filter="all">全部</button>
            <button class="filter-btn" data-filter="skill-security-audit">Skill 安全审计</button>
            <button class="filter-btn" data-filter="multichain-contract-vuln">合约审计</button>
            <button class="filter-btn" data-filter="skill-stress-lab">压力测试</button>
          </div>
        </div>
      </div>
      <ul id="history-list" class="history-list">
        <li class="empty" id="history-empty">请先连接钱包查看历史记录</li>
      </ul>
      <div class="pagination" id="pagination">
        <button class="page-btn" id="page-prev" disabled>上一页</button>
        <span class="page-info" id="page-info">第 1 页</span>
        <button class="page-btn" id="page-next" disabled>下一页</button>
      </div>
    </section>
  </section>

  <script src="main.js?v=20260352" type="module"></script>
</body>
</html>
